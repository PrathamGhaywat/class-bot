<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class AI Admin · Login</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <h1 class="login-title">Class AI Admin</h1>
        <p class="login-subtitle">Sign in to manage homework, timetable, appointments, tests, knowledge, and group access.</p>

        <div id="global-status" class="status hidden"></div>

        <div class="grid">
          <input id="password" type="password" placeholder="Admin password" />
          <button id="login-btn" class="btn-primary">Login</button>
        </div>
        <p class="small-muted" style="margin-top: 10px">After login you’ll be taken to the Homework page.</p>
      </div>
    </div>

    <script type="module">
      import { api, q, setStatus, withButtonBusy } from "/admin/shared.js";

      async function submitLogin() {
        const password = q("password").value;
        if (!password.trim()) {
          setStatus("Enter your admin password.", true);
          return;
        }

        await api("/api/login", {
          method: "POST",
          body: JSON.stringify({ password }),
        });

        window.location.href = "/admin/homework";
      }

      q("login-btn").onclick = async () => {
        try {
          await withButtonBusy(q("login-btn"), submitLogin);
        } catch (error) {
          setStatus(error.message || "Login failed", true);
        }
      };

      q("password").addEventListener("keydown", async (event) => {
        if (event.key !== "Enter") return;
        try {
          await withButtonBusy(q("login-btn"), submitLogin);
        } catch (error) {
          setStatus(error.message || "Login failed", true);
        }
      });

      (async () => {
        try {
          await api("/api/session");
          window.location.href = "/admin/homework";
        } catch {
          // No active session.
        }
      })();
    </script>
  </body>
</html>
